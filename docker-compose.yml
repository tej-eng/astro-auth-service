services:
  app:
    build: .
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: dhwaniastrov2
      POSTGRES_PASSWORD: "Shiva@2025#"
      POSTGRES_DB: dhwaniastrov2_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
